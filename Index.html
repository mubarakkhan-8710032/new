<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#f5f7ff,#eef2ff,#f9fafb);
    padding:50px 20px;
}

/* Container */
.prompt-wrapper{
    max-width:950px;
    margin:auto;
}

/* Card */
.prompt-card{
    background:#ffffff;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 18px 45px rgba(0,0,0,0.08);
    margin-bottom:45px;
    transition:0.3s ease;
}

.prompt-card:hover{
    transform:translateY(-6px);
    box-shadow:0 28px 65px rgba(0,0,0,0.12);
}

.prompt-header{
    background: linear-gradient(135deg,#0f172a,#1e3a8a,#7c3aed);
    padding:24px;
    text-align:center;
    box-shadow:0 10px 30px rgba(30,58,138,0.25);
    border-bottom:1px solid rgba(255,255,255,0.08);
}

.prompt-header h3{
    margin:0;
    color:#ffffff;
    font-size:24px;
    font-weight:700;
}

.prompt-body{
    padding:35px;
    background:#f8fafc;
    font-size:20px;
    color:#334155;
    line-height:1.9;
    font-weight:500;
}

.prompt-footer{
    padding:30px;
    text-align:center;
    background:#ffffff;
    border-top:1px solid #e2e8f0;
}

.copy-btn{
    background: linear-gradient(135deg,#f59e0b,#facc15,#fde68a);
    color:#111827;
    border:none;
    padding:16px 42px;
    font-size:16px;
    font-weight:800;
    border-radius:50px;
    cursor:pointer;
    transition:all 0.3s ease;
    box-shadow:0 14px 35px rgba(245,158,11,0.35);
    letter-spacing:0.5px;
    text-transform:uppercase;
}

.copy-btn:hover{
    transform:translateY(-3px) scale(1.06);
    box-shadow:0 20px 45px rgba(245,158,11,0.45);
}

.copy-btn:active{
    transform:scale(0.98);
}


.copy-btn:hover{
    transform:scale(1.08);
    box-shadow:0 18px 45px rgba(16,185,129,0.4);
}

/* Success Modal */
.success-overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.4);
    display:flex;
    justify-content:center;
    align-items:center;
    backdrop-filter:blur(6px);
    opacity:0;
    visibility:hidden;
    transition:0.3s ease;
    z-index:999;
}

.success-overlay.active{
    opacity:1;
    visibility:visible;
}

.success-box{
    background:white;
    padding:50px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 25px 70px rgba(0,0,0,0.25);
}

.success-box h2{
    margin:15px 0;
    color:#10b981;
    font-size:28px;
}

.success-box p{
    color:#64748b;
    font-size:18px;
}

/* Confetti */
.confetti{
    position:fixed;
    width:8px;
    height:8px;
    top:0;
    animation:fall 2s linear forwards;
    z-index:1000;
}

@keyframes fall{
    to{
        transform:translateY(600px) rotate(720deg);
        opacity:0;
    }
}

@media(max-width:768px){
    .prompt-header h3{font-size:20px;}
    .prompt-body{font-size:17px;}
}
</style>
</head>

prompts.forEach((prompt, index) => {
    const card = document.createElement("div");
    card.className = "prompt-card";

  card.innerHTML = `
    <div class="prompt-header">
        <h3>How to Organize a Business as an Entrepreneur ? Prompt ${(index + 1).toString().padStart(2,'0')}</h3>

`;

function copyPrompt(id){
    var text=document.getElementById(id).innerText;
    navigator.clipboard.writeText(text).then(function(){
        showSuccess();
        launchConfetti();
    });
}

function showSuccess(){
    var box=document.getElementById("successBox");
    box.classList.add("active");
    setTimeout(function(){
        box.classList.remove("active");
    },2500);
}

function launchConfetti(){	
    for(let i=0;i<60;i++){
        let conf=document.createElement("div");
        conf.classList.add("confetti");
        conf.style.left=Math.random()*100+"%";
        conf.style.backgroundColor=randomColor();
        conf.style.animationDuration=(Math.random()*2+1)+"s";
        document.body.appendChild(conf);
        setTimeout(()=>{conf.remove();},2000);
    }
}

function randomColor(){
    const colors=["#f43f5e","#f59e0b","#10b981","#3b82f6","#8b5cf6"];
    return colors[Math.floor(Math.random()*colors.length)];
}
